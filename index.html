<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080810">
  <title>Break Monitor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════════
       TOKENS
    ══════════════════════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg:          #080810;
      --surface:     rgba(255,255,255,0.04);
      --surface2:    rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.08);
      --border2:     rgba(255,255,255,0.15);
      --card-bg:     rgba(20,20,30,0.6);
      --header-bg:   rgba(12,12,20,0.7);
      --glass-bg:    rgba(20,20,30,0.7);
      --np-bg:       rgba(12,12,20,0.95);
      --toast-bg:    rgba(20,20,30,0.97);
      --green:       #4ade80;
      --green-bg:    rgba(74,222,128,0.08);
      --green-glow:  rgba(74,222,128,0.18);
      --red:         #f87171;
      --red-bg:      rgba(248,113,113,0.08);
      --red-glow:    rgba(248,113,113,0.18);
      --yellow:      #fbbf24;
      --yellow-bg:   rgba(251,191,36,0.1);
      --yellow-glow: rgba(251,191,36,0.25);
      --blue:        #60a5fa;
      --text:        #f1f5f9;
      --text-mid:    #94a3b8;
      --text-dim:    #475569;
      --input-bg:    rgba(255,255,255,0.05);
      --r:           20px;
      --r-sm:        12px;
    }
    [data-theme="light"] {
      --bg:          #f0f2f5;
      --surface:     rgba(0,0,0,0.03);
      --surface2:    rgba(0,0,0,0.06);
      --border:      rgba(0,0,0,0.09);
      --border2:     rgba(0,0,0,0.15);
      --card-bg:     rgba(255,255,255,0.85);
      --header-bg:   rgba(255,255,255,0.85);
      --glass-bg:    rgba(255,255,255,0.8);
      --np-bg:       rgba(245,247,250,0.97);
      --toast-bg:    rgba(255,255,255,0.97);
      --green:       #16a34a;
      --green-bg:    rgba(22,163,74,0.08);
      --green-glow:  rgba(22,163,74,0.15);
      --red:         #dc2626;
      --red-bg:      rgba(220,38,38,0.08);
      --red-glow:    rgba(220,38,38,0.15);
      --yellow:      #d97706;
      --yellow-bg:   rgba(217,119,6,0.1);
      --yellow-glow: rgba(217,119,6,0.2);
      --blue:        #2563eb;
      --text:        #1e293b;
      --text-mid:    #475569;
      --text-dim:    #94a3b8;
      --input-bg:    rgba(0,0,0,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; transition:background .3s,color .3s; }

    /* ── AMBIENT GLOWS ── */
    .glow { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
    .glow-a { width:700px;height:700px;top:-250px;left:-200px;background:radial-gradient(circle,rgba(74,222,128,0.07) 0%,transparent 70%);animation:drift-a 22s ease-in-out infinite; }
    .glow-b { width:600px;height:600px;bottom:-200px;right:-150px;background:radial-gradient(circle,rgba(96,165,250,0.06) 0%,transparent 70%);animation:drift-b 28s ease-in-out infinite; }
    [data-theme="light"] .glow-a { background:radial-gradient(circle,rgba(74,222,128,0.04) 0%,transparent 70%); }
    [data-theme="light"] .glow-b { background:radial-gradient(circle,rgba(96,165,250,0.04) 0%,transparent 70%); }
    @keyframes drift-a { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
    @keyframes drift-b { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-80px)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn { from{opacity:0;transform:translateY(18px) scale(.9)} to{opacity:1;transform:translateY(0) scale(1)} }

    .app { position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px 20px; }

    header { background:var(--header-bg);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r);padding:18px 28px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-bottom:16px;transition:background .3s; }
    .header-logo { width:46px;height:46px;background:linear-gradient(135deg,#4ade80,#22c55e);border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(74,222,128,.35); }
    .header-text h1 { font-size:19px;font-weight:600;letter-spacing:-.3px; }
    .header-text p  { font-size:12px;color:var(--text-dim);margin-top:2px; }
    .header-clock { margin-left:auto;text-align:right;font-size:32px;font-weight:300;letter-spacing:2px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1;line-height:1; }
    .header-clock .sec { font-size:20px;color:var(--text-dim); }
    .header-clock .date-line { font-size:12px;color:var(--text-dim);font-weight:400;letter-spacing:.5px;margin-top:4px;text-align:right; }
    .progress-wrap { width:100%;height:2px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden; }
    [data-theme="light"] .progress-wrap { background:rgba(0,0,0,0.08); }
    .progress-bar { height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),#22d3ee);transition:width 1s linear; }

    .stats-row { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px; }
    .stat-chip { flex:1;min-width:120px;background:var(--glass-bg);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 18px;transition:background .3s; }
    .stat-chip .n { font-size:30px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1; }
    .stat-chip .l { font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-top:4px; }
    .stat-chip.green .n { color:var(--green); }
    .stat-chip.red   .n { color:var(--red); }
    .stat-chip.blue  .n { color:var(--blue); }

    .toolbar { display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px; }
    .tabs { display:flex;gap:3px;background:var(--glass-bg);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:100px;padding:4px; overflow-x:auto;}
    .tab { padding:6px 16px;border-radius:100px;font:12px/1 'Inter',sans-serif;font-weight:500;color:var(--text-dim);cursor:pointer;background:none;border:none;transition:all .2s; white-space:nowrap; }
    .tab.active { background:var(--surface2);color:var(--text); }
    .btn { padding:9px 18px;border-radius:100px;font:13px/1 'Inter',sans-serif;font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap; }
    .btn:active { transform:scale(.96); }
    .btn-primary { background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16; }
    .btn-ghost { background:var(--glass-bg);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text); }
    .btn-blue { background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue); }
    .search-wrap { position:relative;display:flex;align-items:center; }
    .search-input { background:var(--input-bg);border:1px solid var(--border);border-radius:100px;padding:8px 16px 8px 36px;font:13px 'Inter',sans-serif;color:var(--text);outline:none;width:180px;transition:all .2s; }
    .search-icon { position:absolute;left:12px;color:var(--text-dim);font-size:14px;pointer-events:none; }

    /* ── CARDS ── */
    .grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px; }
    .card { background:var(--card-bg);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);padding:20px 22px;transition:transform .25s,border-color .25s,box-shadow .25s;animation:fadeUp .4s ease-out both; }
    
    .card.working { border-color:rgba(74,222,128,.15); }
    .card.working:hover { box-shadow:0 8px 32px var(--green-glow);border-color:rgba(74,222,128,.3); }
    
    .card.on-break { border-color:rgba(248,113,113,.3);box-shadow:0 0 24px var(--red-glow); }
    
    /* ФИЧА 1: ЖЕЛТЫЙ СТАТУС (Скоро перерыв) */
    .card.soon-break { border-color:var(--yellow); box-shadow:0 0 24px var(--yellow-glow); }
    .card.soon-break:hover { box-shadow:0 8px 40px var(--yellow-glow); }
    [data-theme="light"] .card.soon-break { background:rgba(251,191,36,0.04); }

    .card-header { display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px; }
    .avatar { width:42px;height:42px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0; }
    .badge { display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.4px; }
    .dot { width:7px;height:7px;border-radius:50%;flex-shrink:0; }
    
    .badge-working { background:var(--green-bg);color:var(--green);border:1px solid rgba(74,222,128,.2); }
    .badge-working .dot { background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse-g 2s infinite; }
    
    .badge-break   { background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2); }
    .badge-break   .dot { background:var(--red);box-shadow:0 0 6px var(--red);animation:pulse-r 1.4s infinite; }
    
    .badge-soon    { background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.3); }
    .badge-soon .dot { background:var(--yellow);box-shadow:0 0 6px var(--yellow);animation:pulse-y 1s infinite; }

    @keyframes pulse-g { 0%,100%{box-shadow:0 0 6px var(--green)} 50%{box-shadow:0 0 2px var(--green)} }
    @keyframes pulse-r { 0%,100%{transform:scale(1)} 50%{transform:scale(.75)} }
    @keyframes pulse-y { 0%,100%{box-shadow:0 0 8px var(--yellow)} 50%{box-shadow:0 0 2px var(--yellow)} }

    .card-name  { font-size:16px;font-weight:600;margin-bottom:2px; display:flex; align-items:center; gap:6px;}
    .achivs     { font-size:14px; letter-spacing:2px; }
    .card-hours { font-size:12px;color:var(--text-dim); }
    .countdown  { display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-mid);margin-top:8px; }
    .countdown.urgent { color:var(--yellow); }
    .countdown .cv { font-weight:600;font-variant-numeric:tabular-nums; }

    /* ── ФИЧА 3: ТЕПЛОВАЯ КАРТА (HEATMAP) ── */
    #heatmap-panel { display:none; }
    .hm-container { background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r); padding:24px; }
    .hm-container h3 { margin-bottom: 20px; font-size: 16px; font-weight: 600; color:var(--text); }
    .hm-wrap { display: flex; gap: 6px; align-items: flex-end; height: 220px; padding-top: 20px; overflow-x: auto; padding-bottom:10px;}
    .hm-col { flex: 1; min-width: 32px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .hm-bar-wrap { height: 140px; width: 100%; display: flex; align-items: flex-end; background: var(--surface2); border-radius: 4px; margin-bottom: 8px; position: relative;}
    .hm-bar { width: 100%; background: linear-gradient(0deg, var(--blue), var(--green)); border-radius: 4px; transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .hm-bar:hover { filter: brightness(1.2); }
    .hm-lbl { font-size: 10px; color: var(--text-dim); }
    .hm-val { font-size: 13px; font-weight: 700; margin-top: 4px; color:var(--text); }

    /* Прочие стили как были... */
    .timeline { margin-top:14px; }
    .tl-label { font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px; }
    .tl-bar { position:relative;height:6px;background:rgba(255,255,255,.05);border-radius:3px; }
    [data-theme="light"] .tl-bar { background:rgba(0,0,0,.06); }
    .tl-seg { position:absolute;height:100%;border-radius:3px;background:var(--green);opacity:.45; }
    .tl-seg.active { background:var(--red);opacity:1;box-shadow:0 0 8px var(--red); }
    .tl-now { position:absolute; width:2px;height:calc(100% + 10px);top:-5px; background:#fff;border-radius:2px;z-index:5; box-shadow:0 0 6px rgba(255,255,255,.8); }
    .tl-now::before { content:'';position:absolute;top:-1px;left:-3px; width:8px;height:8px;background:#fff;border-radius:50%; box-shadow:0 0 8px rgba(255,255,255,.9); }

    .shift-progress { margin-top:12px;padding-top:12px;border-top:1px solid var(--border); }
    .sp-row { display:flex;align-items:center;justify-content:space-between;margin-bottom:6px; }
    .sp-mood { font-size:14px; }
    .sp-label { font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px; }
    .sp-meta { display:flex;align-items:center;gap:10px; }
    .sp-pct { font-size:13px;font-weight:700;font-variant-numeric:tabular-nums; }
    .sp-remain { font-size:11px;color:var(--text-dim); }
    .sp-bar-wrap { position:relative;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:visible; }
    .sp-fill { height:100%;border-radius:4px;transition:width .8s; background:linear-gradient(90deg,#4ade80,#22d3ee,#fbbf24,#f97316); background-size:400% 100%; background-position:var(--pos,0%) 0; }
    .sp-marker { position:absolute;top:-3px;width:3px;height:14px; background:#fff;border-radius:2px; box-shadow:0 0 8px rgba(255,255,255,.7); transform:translateX(-50%);transition:left .8s; }
    .sp-over { font-size:10px;margin-top:5px;text-align:center;font-weight:600;letter-spacing:.3px; }

    .loader-wrap { text-align:center;padding:80px 20px; }
    .spinner { width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 16px; }
    .empty { text-align:center;padding:80px 20px;color:var(--text-dim);grid-column:1/-1; }
    .empty .ei { font-size:48px;margin-bottom:12px; }
    .empty h3 { font-size:17px;color:var(--text-mid);margin-bottom:6px; }
  </style>
</head>
<body>

<div class="glow glow-a"></div>
<div class="glow glow-b"></div>

<div class="app">

  <header>
    <div class="header-logo">☕</div>
    <div class="header-text">
      <h1>Break Monitor</h1>
      <p>Мониторинг перерывов сотрудников</p>
    </div>
    <div class="header-clock">
      <div id="clock">--:-- <span class="sec">--</span></div>
      <div class="date-line" id="date-line"></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="pbar" style="width:100%"></div>
    </div>
  </header>

  <div class="stats-row" id="stats" style="display:none">
    <div class="stat-chip green"><div class="n" id="s-work">—</div><div class="l">Работают</div></div>
    <div class="stat-chip red">  <div class="n" id="s-break">—</div><div class="l">На перерыве</div></div>
    <div class="stat-chip blue"> <div class="n" id="s-total">—</div><div class="l">Всего на смене</div></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <div class="tabs" id="view-tabs">
      <button class="tab active" onclick="setView('cards',this)">☰ Карточки</button>
      <button class="tab" onclick="setView('day',this)">📅 На день</button>
      <button class="tab" onclick="setView('heatmap',this)">📊 Нагрузка</button> <!-- ФИЧА 3 -->
      <button class="tab" onclick="setView('tomorrow',this)">🚀 Завтра</button> <!-- ФИЧА 4 -->
      <button class="tab" onclick="setView('off',this)">🏖️ Выходные</button>
    </div>
    <div class="tabs" id="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">Все</button>
      <button class="tab" onclick="setFilter('working',this)">Работают</button>
      <button class="tab" onclick="setFilter('break',this)">Перерыв</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search" placeholder="Поиск...">
    </div>
    <button class="btn btn-ghost" id="refresh-btn" onclick="manualRefresh()">Обновить</button>
  </div>

  <!-- MAIN CONTAINERS -->
  <div id="main" style="display:block"> <!-- Для теста сразу блок -->
    <div id="loader-wrap" class="loader-wrap"><div class="spinner"></div><p style="color:var(--text-dim)">Синхронизация...</p></div>
    
    <div class="grid" id="grid"></div>
    <div id="day-panel" style="display:none"><div class="dv-outer"><div id="dv-inner"></div></div></div>
    <div class="grid" id="off-panel" style="display:none"></div>
    <div class="grid" id="tomorrow-panel" style="display:none"></div> <!-- ФИЧА 4 -->
    <div id="heatmap-panel"></div> <!-- ФИЧА 3 -->
  </div>

</div>

<script>
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyFUAo8Nl4wJFItNbbDICQtmt_XC6vVOecWphF714S_I4deQcCRMnhY-_ALyjuW2Kq1/exec';
  const INTERVAL    = 20;

  let data        = [];
  let offDayData  = [];
  let tomorrowData= []; // Данные на завтра
  let filter      = 'all';
  let searchQuery = '';
  let timer       = INTERVAL;
  let currentView = 'cards';

  // CLOCK
  const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const DAYS   = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  function tickClock() {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0'), m = String(n.getMinutes()).padStart(2,'0'), s = String(n.getSeconds()).padStart(2,'0');
    document.getElementById('clock').innerHTML = `${h}:${m} <span class="sec">${s}</span>`;
    document.getElementById('date-line').textContent = `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]}`;
    tickCountdowns();
  }
  setInterval(tickClock, 1000); tickClock();

  function tickProgress() {
    timer--;
    if (timer <= 0) { timer = INTERVAL; fetchData(); }
    document.getElementById('pbar').style.width = (timer/INTERVAL*100)+'%';
  }
  setInterval(tickProgress,1000);

  // VIEW SWITCH
  function setView(v, el) {
    currentView = v;
    el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    
    document.getElementById('grid').style.display           = v==='cards' ? 'grid' : 'none';
    document.getElementById('day-panel').style.display      = v==='day'   ? 'block': 'none';
    document.getElementById('off-panel').style.display      = v==='off'   ? 'grid' : 'none';
    document.getElementById('tomorrow-panel').style.display = v==='tomorrow'? 'grid' : 'none';
    document.getElementById('heatmap-panel').style.display  = v==='heatmap' ? 'block' : 'none';
    
    document.getElementById('filter-tabs').style.display = v==='cards' ? '' : 'none';
    
    if (v==='day') { /* renderDayView(); */ }
    if (v==='off') renderOffView();
    if (v==='tomorrow') renderTomorrowView();
    if (v==='heatmap') renderHeatmapView();
  }

  function setFilter(f, el) {
    filter=f;
    document.querySelectorAll('#filter-tabs .tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active'); renderCards();
  }
  
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase().trim(); 
    if (currentView === 'cards') renderCards();
    else if (currentView === 'off') renderOffView();
    else if (currentView === 'tomorrow') renderTomorrowView();
  });

  function manualRefresh() { timer=INTERVAL; fetchData(); }

  // FETCH
  async function fetchData() {
    document.getElementById('refresh-btn').classList.add('spin');
    try {
      const res = await fetch(WEB_APP_URL+'?_='+Date.now());
      const json = await res.json();
      
      data = json.employees || [];
      offDayData = json.offDay || [];
      tomorrowData = json.tomorrow || []; // Из бэкенда
      
      if (json.t !== undefined) {
        window._tzOffset = json.t - (new Date().getHours()*60 + new Date().getMinutes());
      }
      
      document.getElementById('loader-wrap').style.display='none';
      document.getElementById('stats').style.display='flex';
      document.getElementById('toolbar').style.display='flex';
      updateStats();
      
      if (currentView==='cards') renderCards();
      else if (currentView==='off') renderOffView();
      else if (currentView==='tomorrow') renderTomorrowView();
      else if (currentView==='heatmap') renderHeatmapView();
      
    } catch(e) {
      console.error(e);
    } finally { document.getElementById('refresh-btn').classList.remove('spin'); }
  }

  function updateStats() {
    const ob = data.filter(e=>e.onBreak).length;
    document.getElementById('s-work').textContent  = data.length-ob;
    document.getElementById('s-break').textContent = ob;
    document.getElementById('s-total').textContent = data.length;
  }

  // HELPERS
  function parseSchedule(arr) {
    if (!arr) return [];
    return arr.map(s=>{
      if (!s) return null;
      const m=s.match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
      if(!m) return null;
      return {start:+m[1]*60+ +m[2],end:+m[3]*60+ +m[4],label:s};
    }).filter(Boolean);
  }
  function parseWorkHours(str) {
    if (!str) return null;
    const m=str.match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
    if(!m) return null;
    return {start:+m[1]*60+ +m[2],end:+m[3]*60+ +m[4]};
  }
  function fmt(min) {
    const m = ((Math.round(min) % 1440) + 1440) % 1440;
    return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
  }
  function serverNow() { return new Date().getHours()*60 + new Date().getMinutes() + (window._tzOffset || 0); }
  function toLocalMin(mskMin) { return mskMin - (window._tzOffset || 0); }
  
  // ФИЧА 1: ЖЕЛТАЯ ЗОНА (Изменена логика: <= 15 минут)
  function countdownText(emp) {
    const cur=serverNow();
    const segs=parseSchedule(emp.breakSchedule);
    if (emp.onBreak) {
      const a=segs.find(s=>cur>=s.start&&cur<=s.end);
      if(a){const r=a.end-cur;if(r<=0)return{t:'Заканчивается',urgent:true};return{t:`Конец через ${r} мин`,urgent:false};}
    } else {
      const up=segs.filter(s=>s.start>cur).sort((a,b)=>a.start-b.start);
      if(up.length){
        const d=up[0].start-cur;
        if(d<=15) return {t:`Перерыв через ${d} мин`, urgent:true, soon:true}; // <-- Желтая зона 15 мин
        if(d<60)  return {t:`Перерыв через ${d} мин`, urgent:false};
        const hh=Math.floor(d/60),mm=d%60; return {t:`Перерыв через ${hh}ч${mm?' '+mm+'м':''}`,urgent:false};
      }
      return{t:'Перерывов не осталось',urgent:false};
    }
    return null;
  }

  // RENDER CARDS (ФИЧИ 1 и 6)
  function renderCards() {
    const grid=document.getElementById('grid');
    let list=[...data];
    if (filter === 'working') list = list.filter(e => !e.onBreak);
    if (filter === 'break')   list = list.filter(e =>  e.onBreak);
    if (searchQuery) list=list.filter(e=>e.name.toLowerCase().includes(searchQuery));
    
    // ФИЧА 6: АЧИВКИ (Рассчитываем глобально)
    let earlyBird = 99999, ironMan = 0;
    data.forEach(e => {
      const wh = parseWorkHours(e.workHours);
      if(wh) {
        if(wh.start < earlyBird) earlyBird = wh.start;
        if(wh.end - wh.start > ironMan) ironMan = wh.end - wh.start;
      }
    });

    if(!list.length){
      grid.innerHTML='<div class="empty"><div class="ei">'+(searchQuery?'🔍':'🌙')+'</div><h3>Не найдено</h3></div>';
      return;
    }
    grid.innerHTML='';
    
    list.forEach((emp,i)=>{
      const ob=emp.onBreak, ini=emp.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const color='#60a5fa'; // Дефолтный цвет
      const cd=countdownText(emp);
      
      // ФИЧА 1: Определение желтого статуса
      const isSoon = !ob && cd && cd.soon;
      const cardClass = ob ? 'on-break' : (isSoon ? 'soon-break' : 'working');
      const badgeClass = ob ? 'badge-break' : (isSoon ? 'badge-soon' : 'badge-working');
      const badgeText = ob ? 'Перерыв' : (isSoon ? 'Скоро перерыв' : 'За работой');

      // ФИЧА 6: Присвоение ачивок
      let achivs = '';
      const wh = parseWorkHours(emp.workHours);
      if (wh) {
        if (wh.start === earlyBird && earlyBird !== 99999) achivs += '<span title="Ранняя пташка (Начал раньше всех)">🐦</span>';
        if ((wh.end - wh.start) === ironMan && ironMan !== 0) achivs += '<span title="Железный человек (Самая длинная смена)">🛡️</span>';
        const pct = (serverNow() - wh.start) / (wh.end - wh.start);
        if (pct >= 0.48 && pct <= 0.52) achivs += '<span title="Экватор смены!">🏁</span>';
      }

      const el=document.createElement('div');
      el.className=`card ${cardClass}`;
      el.dataset.name=emp.name;
      el.style.animationDelay=(i*.05)+'s';
      
      el.innerHTML=`
        <div class="card-header">
          <div class="avatar" style="background:${color}20;border-color:${color}60;color:${color}">${ini}</div>
          <div class="badge ${badgeClass}">
            <span class="dot"></span>${badgeText}
          </div>
        </div>
        <div class="card-name">${emp.name} <span class="achivs">${achivs}</span></div>
        <div class="card-hours">${emp.workHours}</div>
        ${cd?`<div class="countdown${cd.urgent?' urgent':''}" data-emp="${emp.name}"><span>⏱</span><span class="cv">${cd.t}</span></div>`:''}
      `;
      grid.appendChild(el);
    });
  }

  function tickCountdowns() {
    document.querySelectorAll('.countdown').forEach(el=>{
      const emp=data.find(e=>e.name===el.dataset.emp); if(!emp)return;
      const cd=countdownText(emp);
      if(cd){el.querySelector('.cv').textContent=cd.t;el.classList.toggle('urgent',cd.urgent);}
    });
  }

  // ── ВЫХОДНЫЕ (Сегодня) ──
  function renderOffView() {
    const panel = document.getElementById('off-panel');
    let list = [...offDayData];
    if (searchQuery) list = list.filter(e => e.name.toLowerCase().includes(searchQuery));
    if (!list.length) { panel.innerHTML = '<div class="empty"><h3>Никого нет</h3></div>'; return; }
    panel.innerHTML = '';
    list.forEach((emp, i) => {
      const el = document.createElement('div');
      el.className = 'card'; el.style.opacity = '0.65'; el.style.boxShadow = 'none';
      let r = emp.reason ? emp.reason.trim() : '';
      let b = 'Выходной';
      if (r.toLowerCase() === 'отп') b = 'В отпуске';
      else if (r.toLowerCase().includes('б/л')) b = 'Больничный';
      else if (r === 'Ждёт смену' || r === 'Смена окончена') b = r;
      el.innerHTML = `<div class="card-header"><div class="avatar" style="filter:grayscale(1)">${emp.name.slice(0,2)}</div><div class="badge" style="background:var(--surface2)"><span class="dot" style="background:var(--text-dim);box-shadow:none"></span>${b}</div></div><div class="card-name">${emp.name}</div>`;
      panel.appendChild(el);
    });
  }

  // ── ФИЧА 4: ВЛАДКА "ЗАВТРА" ──
  function renderTomorrowView() {
    const panel = document.getElementById('tomorrow-panel');
    let list = [...tomorrowData];
    if (searchQuery) list = list.filter(e => e.name.toLowerCase().includes(searchQuery));
    
    if (!list.length) {
      panel.innerHTML = '<div class="empty"><div class="ei">🚀</div><h3>Завтрашний график пуст</h3></div>';
      return;
    }

    panel.innerHTML = '';
    list.forEach((emp, i) => {
      const s = emp.shift.toLowerCase();
      const isOff = ['в','вых','выход','отп','б/л','б','-',''].includes(s) || !emp.shift;
      
      let badge = isOff ? 'Выходной' : 'Смена';
      if (s === 'отп') badge = 'В отпуске';
      if (s === 'б/л') badge = 'Больничный';

      const el = document.createElement('div');
      el.className = 'card';
      el.style.animationDelay = (i * 0.05) + 's';
      if (isOff) { el.style.opacity = '0.65'; el.style.boxShadow = 'none'; }

      el.innerHTML = `
        <div class="card-header">
          <div class="avatar" style="${isOff?'filter:grayscale(1)':''}">${emp.name.slice(0,2)}</div>
          <div class="badge" style="background:var(--surface2); border:1px solid var(--border)">
            <span class="dot" style="background:var(--text-dim);box-shadow:none"></span>${badge}
          </div>
        </div>
        <div class="card-name">${emp.name}</div>
        <div class="card-hours">${isOff ? 'Вне смены' : emp.shift}</div>
      `;
      panel.appendChild(el);
    });
  }

  // ── ФИЧА 3: ТЕПЛОВАЯ КАРТА (Анализ нагрузки) ──
  function renderHeatmapView() {
    const p = document.getElementById('heatmap-panel');
    if (!data.length) { p.innerHTML = '<div class="empty">Нет данных</div>'; return; }

    let dayStart=24*60, dayEnd=0;
    data.forEach(e => {
      const wh=parseWorkHours(e.workHours);
      if(wh){ dayStart=Math.min(dayStart,wh.start); dayEnd=Math.max(dayEnd,wh.end); }
    });
    if(dayStart>=dayEnd) { dayStart=8*60; dayEnd=22*60; }
    dayStart = Math.floor(dayStart/60)*60;
    dayEnd   = Math.ceil(dayEnd/60)*60;

    const intervals = [];
    // Шаг 30 минут
    for(let m = dayStart; m <= dayEnd; m += 30) {
      let activeCount = 0;
      data.forEach(emp => {
        const wh = parseWorkHours(emp.workHours);
        const segs = parseSchedule(emp.breakSchedule);
        // Если попадает в рабочие часы и не попадает в перерыв
        if (wh && m >= wh.start && m < wh.end) {
          const isOnBreak = segs.some(s => m >= s.start && m < s.end);
          if (!isOnBreak) activeCount++;
        }
      });
      intervals.push({ time: m, count: activeCount });
    }

    const maxC = Math.max(...intervals.map(i => i.count), 1);
    
    let h = '<div class="hm-wrap">';
    intervals.forEach(i => {
      const height = (i.count / maxC) * 100; // Процент высоты столбца
      // Чем больше людей, тем зеленее (или выше столб)
      h += `
        <div class="hm-col">
          <div class="hm-bar-wrap">
            <div class="hm-bar" style="height:${height}%" title="${fmt(i.time)} — ${i.count} чел."></div>
          </div>
          <div class="hm-lbl">${fmt(i.time)}</div>
          <div class="hm-val">${i.count}</div>
        </div>
      `;
    });
    h += '</div>';

    p.innerHTML = `
      <div class="hm-container">
        <h3>Анализ нагрузки на сегодня (Активные сотрудники)</h3>
        ${h}
      </div>
    `;
  }

  // Старт
  fetchData();
</script>
