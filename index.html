}
[data-theme="light"] {
  --bg:#f0f4f8;--s:rgba(255,255,255,.90);--s2:rgba(255,255,255,.97);--s3:#fff;

[data-theme="light"] .glow { display:none }
[data-theme="light"] body  { background:var(--bg) }

*,*::before,*::after { box-sizing:border-box;margin:0;padding:0 }
body { background:var(--bg);color:var(--t);font-family:var(--font);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s }

body.fullscreen #collapsible,
body.fullscreen #stats,

body.fullscreen .app { padding:10px;max-width:100% }

.glow { position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0 }
.ga { width:700px;height:700px;top:-250px;left:-200px;background:radial-gradient(circle,rgba(74,222,128,.07),transparent 70%);animation:da 22s ease-in-out infinite }
.gb { width:600px;height:600px;bottom:-200px;right:-150px;background:radial-gradient(circle,rgba(96,165,250,.06),transparent 70%);animation:db 28s ease-in-out infinite }
.gc { width:400px;height:400px;top:40%;left:40%;background:radial-gradient(circle,rgba(251,191,36,.03),transparent 70%);animation:dc 35s ease-in-out infinite }
@keyframes da{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
@keyframes db{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
@keyframes dc{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-40px)}66%{transform:translate(-40px,40px)}}

.app { position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px 20px }

.clock   { font-size:32px;font-weight:300;letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1 }
.clock .sec { font-size:20px;color:var(--td) }
.dateline   { font-size:12px;color:var(--td) }

.pbar-wrap { width:100%;height:2px;background:rgba(128,128,128,.12);border-radius:2px;overflow:hidden }
.pbar      { height:100%;background:linear-gradient(90deg,var(--green),#22d3ee);transition:width 1s linear }

.stats-row { display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px }
.chip { flex:1;min-width:120px;background:var(--s);border:1px solid var(--b);backdrop-filter:blur(12px);border-radius:var(--rs);padding:14px 18px;transition:background .3s }
.chip .n { font-size:30px;font-weight:700;line-height:1 }
.chip .l { font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:.6px;margin-top:4px }
.chip.cg .n{color:var(--green)}.chip.cr .n{color:var(--red)}.chip.cb .n{color:var(--blue)}

.toolbar { display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px }
.tabs { display:flex;gap:3px;background:var(--s);border:1px solid var(--b);border-radius:100px;padding:4px }
.tab { padding:6px 16px;border-radius:100px;font:12px/1 var(--font);font-weight:500;color:var(--td);cursor:pointer;background:none;border:none;transition:all .2s }
.tab.active { background:var(--s3);color:var(--t) }

.btn { padding:9px 18px;border-radius:100px;font:13px/1 var(--font);font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap }
.btn:active { transform:scale(.96) }
.btn-p { background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16 }
.btn-p:hover { box-shadow:0 0 24px rgba(74,222,128,.4) }
.btn-g { background:var(--s);backdrop-filter:blur(12px);border:1px solid var(--b);color:var(--t) }
.btn-g:hover { background:var(--s2);border-color:var(--b2) }
.btn-b { background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue) }
.btn-b:hover { background:rgba(96,165,250,.18) }
.btn.pressed { background:var(--s3);border-color:var(--b2) }
.mla { margin-left:auto }
.ts  { font-size:12px;color:var(--td) }
.btn.spin svg { animation:spin .8s linear infinite }
@keyframes spin{to{transform:rotate(360deg)}}

.srchwrap { position:relative;display:flex;align-items:center }
.srchwrap svg { position:absolute;left:10px;pointer-events:none;color:var(--td) }
