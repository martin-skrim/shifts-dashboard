<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#080810">
  <title>Break Monitor</title>
  >
  //fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       ТОКЕНЫ — тёмная тема
    ══════════════════════════════════════════ */
    :root {
      --bg:          #080810;
      --surface:     rgba(255,255,255,0.04);
      --surface2:    rgba(255,255,255,0.07);
      --surface3:    rgba(255,255,255,0.10);
      --border:      rgba(255,255,255,0.08);
      --border2:     rgba(255,255,255,0.14);
      --green:       #4ade80;
      --green-bg:    rgba(74,222,128,0.08);
      --green-glow:  rgba(74,222,128,0.18);
      --red:         #f87171;
      --red-bg:      rgba(248,113,113,0.08);
      --red-glow:    rgba(248,113,113,0.18);
      --blue:        #60a5fa;
      --yellow:      #fbbf24;
      --text:        #f1f5f9;
      --text-mid:    #94a3b8;
      --text-dim:    #475569;
      --font:        'Inter', sans-serif;
      --r:           20px;
      --r-sm:        12px;
      --shadow:      0 4px 24px rgba(0,0,0,.4);
    }

    /* ══════════════════════════════════════════
       СВЕТЛАЯ ТЕМА
    ══════════════════════════════════════════ */
    [data-theme="light"] {
      --bg:        #f0f4f8;
      --surface:   rgba(255,255,255,0.85);
      --surface2:  rgba(255,255,255,0.95);
      --surface3:  rgba(255,255,255,1);
      --border:    rgba(0,0,0,0.08);
      --border2:   rgba(0,0,0,0.14);
      --green:     #16a34a;
      --green-bg:  rgba(22,163,74,0.10);
      --green-glow:rgba(22,163,74,0.15);
      --red:       #dc2626;
      --red-bg:    rgba(220,38,38,0.08);
      --red-glow:  rgba(220,38,38,0.15);
      --blue:      #2563eb;
      --yellow:    #d97706;
      --text:      #0f172a;
      --text-mid:  #475569;
      --text-dim:  #94a3b8;
      --shadow:    0 4px 24px rgba(0,0,0,.10);
    }
    [data-theme="light"] body { background: var(--bg); }
    [data-theme="light"] .glow { display: none; }
    [data-theme="light"] header,
    [data-theme="light"] .stat-chip,
    [data-theme="light"] .toolbar,
    [data-theme="light"] .card,
    [data-theme="light"] .notif-panel,
    [data-theme="light"] .day-view,
    [data-theme="light"] .ob-card {
      backdrop-filter: none;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    [data-theme="light"] .tabs { background: var(--surface2); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s;
    }

    /* ── GLOWS ── */
    .glow { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
    .glow-a{width:700px;height:700px;top:-250px;left:-200px;background:radial-gradient(circle,rgba(74,222,128,.07) 0%,transparent 70%);animation:drift-a 22s ease-in-out infinite;}
    .glow-b{width:600px;height:600px;bottom:-200px;right:-150px;background:radial-gradient(circle,rgba(96,165,250,.06) 0%,transparent 70%);animation:drift-b 28s ease-in-out infinite;}
    .glow-c{width:400px;height:400px;top:40%;left:40%;background:radial-gradient(circle,rgba(251,191,36,.03) 0%,transparent 70%);animation:drift-c 35s ease-in-out infinite;}
    @keyframes drift-a{0%,100%{transform:translate(0,0)}50%{transform:translate(80px,60px)}}
    @keyframes drift-b{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}}
    @keyframes drift-c{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-40px)}66%{transform:translate(-40px,40px)}}

    /* ── LAYOUT ── */
    .app { position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:24px 20px; }
    body.fullscreen .app { max-width:100%; padding:12px; }
    body.fullscreen #collapsible { display:none !important; }
    body.fullscreen #stats       { display:none !important; }
    body.fullscreen #toolbar     { display:none !important; }
    body.fullscreen .grid        { gap:10px; }

    /* ── HEADER ── */
    header {
      background:var(--surface);backdrop-filter:blur(24px);
      border:1px solid var(--border);border-radius:var(--r);
      padding:18px 28px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:16px;
      margin-bottom:16px;transition:background .3s,border-color .3s;
    }
    .header-logo{width:46px;height:46px;background:linear-gradient(135deg,#4ade80,#22c55e);border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(74,222,128,.35);}
    .header-text h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
    .header-text p{font-size:12px;color:var(--text-dim);margin-top:2px;}
    .header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
    .header-clock{font-size:32px;font-weight:300;letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1;}
    .header-clock .sec{font-size:20px;color:var(--text-dim);}
    .date-line{font-size:12px;color:var(--text-dim);}
    .msk-badge{font-size:11px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;}
    .progress-wrap{width:100%;height:2px;background:rgba(128,128,128,.15);border-radius:2px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),#22d3ee);transition:width 1s linear;}

    /* ── STATS ── */
    .stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .stat-chip{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(12px);border-radius:var(--r-sm);padding:14px 18px;transition:background .3s;}
    .stat-chip .n{font-size:30px;font-weight:700;line-height:1;}
    .stat-chip .l{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;margin-top:4px;}
    .stat-chip.green .n{color:var(--green);}
    .stat-chip.red   .n{color:var(--red);}
    .stat-chip.blue  .n{color:var(--blue);}

    /* ── TOOLBAR ── */
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
    .tabs{display:flex;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px;backdrop-filter:blur(12px);}
    .tab{padding:6px 16px;border-radius:100px;font:12px/1 var(--font);font-weight:500;color:var(--text-dim);cursor:pointer;background:none;border:none;transition:all .2s;}
    .tab.active{background:var(--surface3);color:var(--text);}
    .btn{padding:9px 18px;border-radius:100px;font:13px/1 var(--font);font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap;}
    .btn:active{transform:scale(.96);}
    .btn-primary{background:linear-gradient(135deg,#4ade80,#22c55e);color:#052e16;}
    .btn-primary:hover{box-shadow:0 0 24px rgba(74,222,128,.4);}
    .btn-ghost{background:var(--surface);backdrop-filter:blur(12px);border:1px solid var(--border);color:var(--text);}
    .btn-ghost:hover{background:var(--surface2);border-color:var(--border2);}
    .btn-blue{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--blue);}
    .btn-blue:hover{background:rgba(96,165,250,.18);}
    .btn.spin svg{animation:spin .8s linear infinite;}
    .btn.active-view{background:var(--surface3);border-color:var(--border2);}
    .ml-auto{margin-left:auto;}
    .ts{font-size:12px;color:var(--text-dim);}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── SEARCH ── */
    .search-wrap{position:relative;display:flex;align-items:center;}
    .search-wrap svg{position:absolute;left:10px;color:var(--text-dim);pointer-events:none;}
    #search-input{
      background:var(--surface);border:1px solid var(--border);border-radius:100px;
      color:var(--text);font:13px var(--font);padding:8px 16px 8px 34px;
      outline:none;width:180px;transition:width .25s,border-color .2s;
    }
    #search-input::placeholder{color:var(--text-dim);}
    #search-input:focus{width:220px;border-color:var(--border2);}

    /* ── ONBOARDING ── */
    #onboarding{display:flex;align-items:center;justify-content:center;min-height:55vh;}
    .ob-card{text-align:center;max-width:420px;padding:44px 40px;background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r);}
    .ob-card .icon{font-size:60px;margin-bottom:20px;}
    .ob-card h2{font-size:24px;font-weight:600;margin-bottom:10px;}
    .ob-card p{font-size:14px;color:var(--text-mid);line-height:1.65;margin-bottom:28px;}
    .ob-feats{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;text-align:left;}
    .ob-feat{font-size:13px;color:var(--text-mid);display:flex;gap:10px;}

    /* ══════════════════════════════════════════
       CARDS VIEW
    ══════════════════════════════════════════ */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}
    .card{
      background:var(--surface);backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--r);
      padding:20px 22px;
      transition:transform .25s,border-color .25s,box-shadow .25s,background .3s;
      animation:fadeUp .4s ease-out both;position:relative;overflow:hidden;
      cursor:grab;user-select:none;
    }
    .card:active{cursor:grabbing;}
    .card.dragging{opacity:.4;transform:scale(.97);}
    .card.drag-over{border-color:var(--blue);box-shadow:0 0 0 2px rgba(96,165,250,.3);}
    .card:hover{transform:translateY(-3px);}
    .card.working{border-color:rgba(74,222,128,.15);}
    .card.working:hover{box-shadow:0 8px 32px var(--green-glow);border-color:rgba(74,222,128,.3);}
    .card.on-break{border-color:rgba(248,113,113,.3);box-shadow:0 0 24px var(--red-glow);background:rgba(248,113,113,.04);}
    .card.on-break:hover{box-shadow:0 8px 40px rgba(248,113,113,.3);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    .drag-handle{position:absolute;top:10px;left:10px;color:var
