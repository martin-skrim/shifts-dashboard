<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мониторинг</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #131314; --surface: #1E1F22; --primary: #81C995; --break: #F28B82; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .card { background: var(--surface); padding: 20px; border-radius: 20px; }
        .on-break { border: 2px solid var(--break); }
        .progress { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .bar { height: 100%; background: var(--break); transition: 1s; }
    </style>
</head>
<body>
    <button id="start-btn">Включить уведомления</button>
    <div id="grid" class="grid" style="margin-top:20px"></div>

    <script>
        const WEB_APP_URL = '{{MY_SECRET_API_URL}}';
        let previousState = {};

        // Запуск
        document.getElementById('start-btn').onclick = () => {
            Notification.requestPermission();
            fetchData();
            setInterval(fetchData, 30000); // 30 секунд
            document.getElementById('start-btn').style.display = 'none';
        };

        async function fetchData() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                render(data);
            } catch(e) { console.error(e); }
        }

        function render(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const serverTime = data.serverTime;

            data.employees.forEach(emp => {
                // Логика уведомлений (сравниваем статус)
                if (previousState[emp.name] && previousState[emp.name] !== emp.status) {
                    new Notification(emp.status === 'break' ? 'Перерыв' : 'Возврат', { body: emp.name });
                }
                previousState[emp.name] = emp.status;

                // Рендер карточки
                const card = document.createElement('div');
                card.className = `card ${emp.status === 'break' ? 'on-break' : ''}`;
                let progress = '';
                if(emp.status === 'break' && emp.activeBreak) {
                    let total = emp.activeBreak.end - emp.activeBreak.start;
                    let passed = serverTime - emp.activeBreak.start;
                    progress = `<div class="progress"><div class="bar" style="width:${Math.min((passed/total)*100, 100)}%"></div></div>`;
                }

                card.innerHTML = `
                    <h3>${emp.name}</h3>
                    <p>🕒 ${emp.hours}</p>
                    <p>☕ ${emp.breaks.join(', ')}</p>
                    <div style="font-weight:bold; color:${emp.status==='break'? 'var(--break)':'var(--primary)'}">
                        ${emp.status === 'break' ? 'НА ПЕРЕРЫВЕ' : 'РАБОТАЕТ'}
                    </div>
                    ${progress}
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
